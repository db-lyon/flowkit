name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # write: the post-publish step pushes a git tag and cuts a GitHub Release.
      contents: write
      # OIDC trusted publisher: npm CLI exchanges this for a short-lived
      # publish token at npmjs.org. The trusted publisher binding is
      # configured on the npm side (workflow filename + repo + branch).
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Check if version changed
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @db-lyon/flowkit version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Trusted publishing requires npm CLI 11.5.1+. The setup-node action
      # ships an older npm with Node 20, so install a modern one explicitly.
      - name: Upgrade npm for trusted publishing
        if: steps.version.outputs.changed == 'true'
        run: npm install -g npm@latest

      - run: npm ci
        if: steps.version.outputs.changed == 'true'

      - run: npm test
        if: steps.version.outputs.changed == 'true'

      - run: npm publish --access=public --provenance
        if: steps.version.outputs.changed == 'true'

      # On a real version bump, tag the published commit and cut a GitHub
      # Release with auto-generated notes. Keeps tags/Releases in lockstep
      # with npm without a separate tag-push trigger.
      - name: Tag and create GitHub Release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The runner has no git identity; annotated tags need one.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          V="v${{ steps.version.outputs.local }}"
          git tag -a "$V" -m "$V"
          git push origin "$V"
          gh release create "$V" --title "$V" --generate-notes
